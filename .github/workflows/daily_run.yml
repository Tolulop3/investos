name: InvestOS Daily Run

on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

jobs:
  daily-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run InvestOS daily analysis
        run: python run_daily.py --github

      - name: Commit updated dashboard
        run: |
          git config --global user.name "InvestOS Bot"
          git config --global user.email "investos-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Daily brief $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
